<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US State Livability Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F6F3;
      --text:      #1C1C1E;
      --muted:     #6E6E73;
      --border:    #E0DED9;
      --accent:    #005F73;
      --valid:     #2D6A4F;
      --invalid:   #B5331A;
      --tier-1:    #005F73;
      --tier-2:    #4C9EB5;
      --tier-3:    #A8D1DC;
      --tier-4:    #E2EEF1;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      font-size: 15px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 52px 24px 40px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    header p {
      font-size: 14px;
      color: var(--muted);
      max-width: 560px;
    }

    /* ── Controls ───────────────────────────────────────────────── */
    .controls-section {
      margin-bottom: 28px;
    }

    .section-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .sliders-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px 24px;
      margin-bottom: 12px;
    }

    .slider-item {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .slider-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .slider-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      transition: background 0.1s;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 2px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      margin-top: -5.5px;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.25);
      box-shadow: 0 0 0 4px rgba(0, 95, 115, 0.12);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .weight-status {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 24px;
    }

    .weight-total {
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      transition: color 0.2s;
    }

    .weight-total.valid   { color: var(--valid); }
    .weight-total.invalid { color: var(--invalid); }

    .weight-hint {
      font-size: 12px;
      color: var(--muted);
    }

    .reset-btn {
      margin-left: auto;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 4px 11px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.01em;
    }

    .reset-btn:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ── Map ────────────────────────────────────────────────────── */
    .map-section {
      margin-bottom: 12px;
    }

    #map svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .state-path {
      stroke: #fff;
      stroke-width: 0.6;
      cursor: default;
      transition: opacity 0.12s;
    }

    .state-path:hover {
      opacity: 0.72;
      stroke-width: 1.4;
    }

    /* ── Legend ─────────────────────────────────────────────────── */
    .legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .legend-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      margin-right: 10px;
    }

    .legend-swatch {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Divider ────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* ── Top 10 ─────────────────────────────────────────────────── */
    .top-ten-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 40px;
    }

    .top-ten-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }

    .top-ten-rank {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      min-width: 22px;
      font-variant-numeric: tabular-nums;
    }

    .top-ten-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .top-ten-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
    }

    .top-ten-score {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Tooltip ─────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.09);
      font-size: 13px;
      width: 230px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.1s;
    }

    #tooltip.visible { opacity: 1; }

    .tt-state {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .tt-tier-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.04em;
    }

    .tt-rank {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .tt-dims {
      border-top: 1px solid var(--border);
      padding-top: 9px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tt-dim-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
    }

    .tt-dim-name {
      color: var(--muted);
      width: 96px;
      flex-shrink: 0;
    }

    .tt-bar-bg {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .tt-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }

    .tt-dim-val {
      font-weight: 500;
      color: var(--text);
      min-width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      margin-top: 40px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .sliders-grid       { grid-template-columns: 1fr 1fr; }
      .top-ten-grid       { grid-template-columns: 1fr; }
    }
    @media (max-width: 420px) {
      .sliders-grid       { grid-template-columns: 1fr; }
    }
  </style>
</head>

</div>

const TIER_TEXT   = { 1: '#fff',    2: '#fff',    3: '#1C1C1E', 4: '#1C1C1E' };

// ── State ──────────────────────────────────────────────────────────────────────
const defaultWeights = {};
WEB_DATA.dimensions.forEach(d => { defaultWeights[d.id] = d.default_weight; });

let weights        = { ...defaultWeights };
let currentResults = [];
let stateMap       = {};

// ── Scoring ────────────────────────────────────────────────────────────────────
function percentile(sorted, p) {
  const n = sorted.length;
  const k = (p / 100) * (n - 1);
  const f = Math.floor(k);
  const c = f + 1;
  if (c >= n) return sorted[n - 1];
  return sorted[f] + (k - f) * (sorted[c] - sorted[f]);
}

function computeScores() {
  const results = WEB_DATA.states.map(s => {
    let score = 0;
    WEB_DATA.dimensions.forEach(d => {
      const v = s.dim[d.id];
      if (v !== null && v !== undefined) score += v * weights[d.id];
    });
    return { state: s.state, abbr: s.abbr, score: Math.round(score * 100) / 100, dim: s.dim };
  });

  results.sort((a, b) => b.score - a.score);
  results.forEach((r, i) => r.rank = i + 1);

  const sorted = results.map(r => r.score).sort((a, b) => a - b);
  const p25 = percentile(sorted, 25);
  const p50 = percentile(sorted, 50);
  const p75 = percentile(sorted, 75);

  results.forEach(r => {
    if      (r.score >= p75) r.tier = 1;
    else if (r.score >= p50) r.tier = 2;
    else if (r.score >= p25) r.tier = 3;
    else                     r.tier = 4;
  });

  currentResults = results;
  stateMap = {};
  results.forEach(r => { stateMap[r.state] = r; });
}

// ── Sliders ────────────────────────────────────────────────────────────────────
function buildSliders() {
  const grid = document.getElementById('sliders-grid');
  WEB_DATA.dimensions.forEach(dim => {
    const item = document.createElement('div');
    item.className = 'slider-item';
    item.innerHTML = `
      <div class="slider-header">
        <span class="slider-name">${dim.label}</span>
        <span class="slider-value" id="val-${dim.id}">${dim.default_weight}%</span>
      </div>
      <input type="range" min="0" max="100" value="${dim.default_weight}"
             id="slider-${dim.id}" data-dim="${dim.id}">
    `;
    grid.appendChild(item);
  });

  document.querySelectorAll('input[type="range"]').forEach(input => {
    input.addEventListener('input', onSliderChange);
  });

  document.getElementById('reset-btn').addEventListener('click', resetWeights);
}

function onSliderChange(e) {
  const dimId = e.target.dataset.dim;
  weights[dimId] = parseInt(e.target.value, 10);
  document.getElementById(`val-${dimId}`).textContent = weights[dimId] + '%';
  updateWeightStatus();
}

function resetWeights() {
  WEB_DATA.dimensions.forEach(dim => {
    weights[dim.id] = dim.default_weight;
    document.getElementById(`slider-${dim.id}`).value = dim.default_weight;
    document.getElementById(`val-${dim.id}`).textContent = dim.default_weight + '%';
  });
  updateWeightStatus();
}

function updateWeightStatus() {
  const total   = Object.values(weights).reduce((a, b) => a + b, 0);
  const totalEl = document.getElementById('weight-total');
  const hintEl  = document.getElementById('weight-hint');

  totalEl.textContent = `Total: ${total}%`;

  if (total === 100) {
    totalEl.className = 'weight-total valid';
    hintEl.textContent = '';
    computeScores();
    updateMap();
    updateTopTen();
  } else {
    totalEl.className = 'weight-total invalid';
    const diff = 100 - total;
    hintEl.textContent = diff > 0 ? `${diff}% remaining` : `${Math.abs(diff)}% over limit`;
  }
}

// ── Map ────────────────────────────────────────────────────────────────────────
async function buildMap() {
  const us     = await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
  const states = topojson.feature(us, us.objects.states);

  const W = 960, H = 600;
  const projection    = d3.geoAlbersUsa().scale(1280).translate([W / 2, H / 2]);
  const pathGenerator = d3.geoPath().projection(projection);

  const svg = d3.select('#map')
    .append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  const tooltip = document.getElementById('tooltip');

  pathSelection = svg.selectAll('.state-path')
    .data(states.features)
    .enter()
    .append('path')
    .attr('class', 'state-path')
    .attr('d', pathGenerator)
    .attr('fill', d => fillColor(d.properties.name))
    .on('mousemove', function(event, d) {
      const result = stateMap[d.properties.name];
      if (!result) return;
      renderTooltip(result);
      positionTooltip(event);
      tooltip.classList.add('visible');
    })
    .on('mouseleave', function() {
      tooltip.classList.remove('visible');
    });
}

function fillColor(stateName) {
  const r = stateMap[stateName];
  return r ? TIER_COLORS[r.tier] : '#ccc';
}

function updateMap() {
  if (!pathSelection) return;
  pathSelection.attr('fill', d => fillColor(d.properties.name));
}

// ── Tooltip ────────────────────────────────────────────────────────────────────
function renderTooltip(result) {
  const tooltip = document.getElementById('tooltip');

  const dimRows = WEB_DATA.dimensions.map(dim => {
    const v   = result.dim[dim.id];
    const pct = v !== null ? Math.round(v * 100) : 0;
    return `
      <div class="tt-dim-row">
        <span class="tt-dim-name">${dim.label}</span>
        <div class="tt-bar-bg"><div class="tt-bar-fill" style="width:${pct}%"></div></div>
        <span class="tt-dim-val">${pct}%</span>
      </div>`;
  }).join('');

  tooltip.innerHTML = `
    <div class="tt-state">
      ${result.state}
      <span class="tt-tier-badge"
            style="background:${TIER_COLORS[result.tier]};color:${TIER_TEXT[result.tier]}">
        Tier ${result.tier}
      </span>
    </div>
    <div class="tt-rank">Ranked #${result.rank} of 50 &middot; Score: ${result.score.toFixed(1)}</div>
    <div class="tt-dims">${dimRows}</div>
  `;
}

function positionTooltip(event) {
  const tooltip = document.getElementById('tooltip');
  const W       = 230;
  const margin  = 14;
  const x       = event.clientX + margin;
  const y       = event.clientY - 10;
  tooltip.style.left = (x + W > window.innerWidth ? event.clientX - W - margin : x) + 'px';
  tooltip.style.top  = Math.max(8, y) + 'px';
}

// ── Top Ten ────────────────────────────────────────────────────────────────────
function updateTopTen() {
  const grid  = document.getElementById('top-ten-grid');
  const top10 = currentResults.slice(0, 10);

  grid.innerHTML = top10.map((r, i) => `
    <div class="top-ten-item">
      <span class="top-ten-rank">${String(i + 1).padStart(2, '0')}</span>
      <div  class="top-ten-dot" style="background:${TIER_COLORS[r.tier]}"></div>
      <span class="top-ten-name">${r.state}</span>
      <span class="top-ten-score">${r.score.toFixed(1)}</span>
    </div>
  `).join('');
}

// ── Init ───────────────────────────────────────────────────────────────────────
computeScores();
buildSliders();
updateWeightStatus();
buildMap().then(() => { updateMap(); updateTopTen(); });
</script>
</body>
</html>
